# Filesystem tag-aware cache pool — default for single-server setups.
# Switch to cache.redis or cache.memcached via CACHE_POOL env var for clustered installs.
# See config/packages/cache_pool/cache.redis.yaml and cache.memcached.yaml for alternatives.
parameters:
    env(CACHE_NAMESPACE): ibexa
    cache_namespace: '%env(CACHE_NAMESPACE)%'

services:
    cache.tagaware.filesystem:
        public: true
        class: Symfony\Component\Cache\Adapter\FilesystemTagAwareAdapter
        parent: cache.adapter.filesystem
        tags:
            -   name: cache.pool
                clearer: cache.app_clearer
                # Namespace ensures cache is reliably scoped and supports blue/green deployments.
                # For multi-repo setups set a unique namespace per pool.
                namespace: '%cache_namespace%'
