ibexa:
    system:
        admin_group:
            content_tree_module:
                contextual_tree_root_location_ids:
                    - 2  # Home (Content structure)
                    - 5  # Users
                    - 43 # Media
                    - 48 # Setup
            subtree_paths:
                content: /1/2/
                media: /1/43/
            default_page: dashboard
            content:
                # No public HTTP cache for admin; use 0 so Varnish/proxy never caches admin pages.
                default_ttl: 0
