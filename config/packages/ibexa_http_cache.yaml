## FOSHttpCache configuration for Ibexa DXP
fos_http_cache:
    cache_control:
        rules:
            # Lower TTL for already-cacheable error/redirect responses from Ibexa routes
            -   match:
                    match_response: "response.isFresh() && ( response.isServerError() || response.isClientError() || response.isRedirect() )"
                headers:
                    overwrite: true
                    cache_control:
                        max_age: 5
                        s_maxage: 20
            # Cache 404s briefly to reduce crawler load; keep short to avoid blocking future valid routes
            -   match:
                    match_response: "!response.isFresh() && response.isNotFound()"
                headers:
                    overwrite: true
                    cache_control:
                        public: true
                        max_age: 0
                        s_maxage: 20
