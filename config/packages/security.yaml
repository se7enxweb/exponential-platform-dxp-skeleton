security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

    providers:
        ibexa:
            id: ibexa.security.user_provider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        ibexa_forgot_password:
            pattern: /user/(forgot-password|reset-password)
            security: false

        ibexa_register_from_invitation:
            pattern: /user/from-invite/register|/from-invite/register
            security: false

        # Uncomment to enable JWT authentication for REST API / GraphQL:
        #ibexa_jwt_rest:
        #    request_matcher: Ibexa\Rest\Security\JWTTokenCreationRESTRequestMatcher
        #    user_checker: Ibexa\Core\MVC\Symfony\Security\UserChecker
        #    stateless: true
        #    provider: ibexa
        #    json_login:
        #        check_path: ibexa.rest.create_token
        #        username_path: JWTInput.username
        #        password_path: JWTInput.password
        #        success_handler: lexik_jwt_authentication.handler.authentication_success
        #        failure_handler: lexik_jwt_authentication.handler.authentication_failure

        #ibexa_jwt_rest.api:
        #    request_matcher: Ibexa\Rest\Security\AuthorizationHeaderRESTRequestMatcher
        #    user_checker: Ibexa\Core\MVC\Symfony\Security\UserChecker
        #    provider: ibexa
        #    stateless: true
        #    jwt: ~

        ibexa_rest:
            pattern: ^/api/ibexa
            provider: ibexa
            user_checker: Ibexa\Core\MVC\Symfony\Security\UserChecker
            context: ibexa
            custom_authenticators:
                - Ibexa\Rest\Security\Authenticator\RestAuthenticator

        ibexa_front:
            pattern: ^/
            provider: ibexa
            user_checker: Ibexa\Core\MVC\Symfony\Security\UserChecker
            context: ibexa
            form_login:
                enable_csrf: true
                login_path: login
                check_path: login_check
            entry_point: form_login
            logout:
                path: logout

        main:
            lazy: true

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
